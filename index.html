<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controller Studio</title>
    <link rel="stylesheet" href="/overlay.css" />
  </head>
  <body>
    <main>
      <canvas class="threejs"></canvas>
    </main>

    <!-- UI overlay — lives on top of the canvas -->
    <div id="overlay">

      <!-- Corner brackets -->
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <!-- Top bar -->
      <div class="top-bar">
        <div class="brand">
          <div class="brand-name">FluidSense</div>
          <div class="brand-sub">by Sony Interactive</div>
        </div>
        <div class="top-center">
          <div class="status-dot"></div>
          <div class="status-text">WebGPU · Live</div>
        </div>
        <div class="top-right">
          <div class="tech-pill">Three.js</div>
          <div class="tech-pill">WebGPU</div>
          <div class="year-tag">2025</div>
        </div>
      </div>

      <!-- Left side label -->
      <div class="left-side">
        <div class="side-line"></div>
        <div class="side-label">DualSense</div>
        <div class="side-line"></div>
      </div>

      <!-- Right side stats -->
      <div class="right-side">
        <div class="stat-item">
          <div class="stat-val">223k</div>
          <div class="stat-key">polygons</div>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <div class="stat-val">60fps</div>
          <div class="stat-key">render</div>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <div class="stat-val">2</div>
          <div class="stat-key">variants</div>
        </div>
      </div>

      <!-- Sound toggle — centered bottom, above bottom bar -->
      <button id="sound-toggle" aria-label="Toggle sound">
        <div class="snd-icon">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span id="snd-label">Sound</span>
      </button>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="bottom-left">
          <div class="headline">Dual<span>Sense</span><br>Explorer</div>
          <div class="tagline">Fluid reveal · Two variants</div>
        </div>
        <div class="bottom-right">
          <div class="variant-stack">
            <div class="variant-row">
              <div class="variant-label">Glacier White</div>
              <div class="variant-dot dot-white"></div>
            </div>
            <div class="variant-row">
              <div class="variant-label">Palmeiras Green</div>
              <div class="variant-dot dot-green"></div>
            </div>
          </div>
          <div class="hint-row">
            <div class="hint-line"></div>
            <div class="hint-text">drag to reveal</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Three.js scene -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
