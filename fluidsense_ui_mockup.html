<style>
*{margin:0;padding:0;box-sizing:border-box}
.screen{
  width:100%;
  aspect-ratio:16/9;
  background:#f0ece4;
  position:relative;
  overflow:hidden;
  font-family:'Inter',system-ui,sans-serif;
  min-height:420px;
}
.controller-zone{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.controller-placeholder{
  width:52%;aspect-ratio:16/9;
  border:1px dashed #b8b09a;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#b8b09a;font-size:12px;letter-spacing:2px;
}
.corner{position:absolute;width:18px;height:18px;}
.corner-tl{top:20px;left:20px;border-top:1.5px solid #2c2c2a;border-left:1.5px solid #2c2c2a;border-radius:3px 0 0 0;}
.corner-tr{top:20px;right:20px;border-top:1.5px solid #2c2c2a;border-right:1.5px solid #2c2c2a;border-radius:0 3px 0 0;}
.corner-bl{bottom:20px;left:20px;border-bottom:1.5px solid #2c2c2a;border-left:1.5px solid #2c2c2a;border-radius:0 0 0 3px;}
.corner-br{bottom:20px;right:20px;border-bottom:1.5px solid #2c2c2a;border-right:1.5px solid #2c2c2a;border-radius:0 0 3px 0;}
.top-bar{
  position:absolute;top:0;left:0;right:0;
  padding:22px 32px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{
  display:flex;flex-direction:column;gap:2px;
}
.brand-name{
  font-size:13px;font-weight:600;letter-spacing:3px;
  color:#1a1a18;text-transform:uppercase;
}
.brand-sub{
  font-size:10px;letter-spacing:2px;color:#7a7568;text-transform:uppercase;
}
.top-right{
  display:flex;align-items:center;gap:16px;
}
.tech-pill{
  padding:4px 10px;border-radius:20px;
  border:0.5px solid #3B6D11;
  color:#3B6D11;font-size:9px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;background:#EAF3DE;
}
.year-tag{
  font-size:10px;color:#7a7568;letter-spacing:1px;
}
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:22px 32px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.bottom-left{display:flex;flex-direction:column;gap:6px;}
.headline{
  font-size:28px;font-weight:700;
  color:#1a1a18;letter-spacing:-0.5px;
  line-height:1.1;
}
.headline span{color:#3B6D11;}
.tagline{
  font-size:11px;color:#7a7568;letter-spacing:1.5px;
  text-transform:uppercase;
}
.bottom-right{
  display:flex;flex-direction:column;align-items:flex-end;gap:10px;
}
.variant-stack{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.variant-row{
  display:flex;align-items:center;gap:8px;
}
.variant-dot{
  width:8px;height:8px;border-radius:50%;
}
.dot-white{background:#f0ece4;border:1px solid #b8b09a;}
.dot-green{background:#3B6D11;}
.variant-label{font-size:10px;color:#5a5548;letter-spacing:1px;text-transform:uppercase;}
.hint-row{
  display:flex;align-items:center;gap:6px;
  margin-top:4px;
}
.hint-line{width:24px;height:0.5px;background:#b8b09a;}
.hint-text{font-size:9px;color:#9a9180;letter-spacing:1.5px;text-transform:uppercase;}
.center-hint{
  position:absolute;
  bottom:50%;left:50%;
  transform:translate(-50%,50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.cursor-icon{
  width:20px;height:20px;
  border:1.5px solid #3B6D11;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.cursor-dot{width:5px;height:5px;border-radius:50%;background:#3B6D11;}
.cursor-label{
  font-size:8px;letter-spacing:2px;color:#7a7568;text-transform:uppercase;
}
.left-side{
  position:absolute;left:20px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:6px;align-items:center;
}
.side-label{
  font-size:8px;letter-spacing:2px;color:#9a9180;
  text-transform:uppercase;
  writing-mode:vertical-rl;
  text-orientation:mixed;
}
.side-line{width:0.5px;height:40px;background:#c8c0b0;}
.right-side{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:4px;align-items:flex-end;
}
.stat-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat-val{font-size:13px;font-weight:600;color:#1a1a18;letter-spacing:-0.5px;}
.stat-key{font-size:8px;letter-spacing:1.5px;color:#9a9180;text-transform:uppercase;}
.divider{width:16px;height:0.5px;background:#c8c0b0;margin:6px 0;}
.top-center{
  position:absolute;top:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
}
.status-dot{width:5px;height:5px;border-radius:50%;background:#3B6D11;}
.status-text{font-size:9px;letter-spacing:2px;color:#7a7568;text-transform:uppercase;}
</style>

<div class="screen">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="controller-zone">
    <div class="controller-placeholder">3D SCENE</div>
  </div>

  <div class="top-bar">
    <div class="brand">
      <div class="brand-name">FluidSense</div>
      <div class="brand-sub">by Sony Interactive</div>
    </div>
    <div class="top-center">
      <div class="status-dot"></div>
      <div class="status-text">WebGPU · Live</div>
    </div>
    <div class="top-right">
      <div class="tech-pill">Three.js</div>
      <div class="tech-pill">WebGPU</div>
      <div class="year-tag">2025</div>
    </div>
  </div>

  <div class="left-side">
    <div class="side-line"></div>
    <div class="side-label">DualSense</div>
    <div class="side-line"></div>
  </div>

  <div class="right-side">
    <div class="stat-item">
      <div class="stat-val">223k</div>
      <div class="stat-key">polygons</div>
    </div>
    <div class="divider"></div>
    <div class="stat-item">
      <div class="stat-val">60fps</div>
      <div class="stat-key">render</div>
    </div>
    <div class="divider"></div>
    <div class="stat-item">
      <div class="stat-val">2</div>
      <div class="stat-key">variants</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="headline">Dual<span>Sense</span><br>Explorer</div>
      <div class="tagline">Fluid reveal · Two variants</div>
    </div>
    <div class="bottom-right">
      <div class="variant-stack">
        <div class="variant-row">
          <div class="variant-label">Glacier White</div>
          <div class="variant-dot dot-white"></div>
        </div>
        <div class="variant-row">
          <div class="variant-label">Palmeiras Green</div>
          <div class="variant-dot dot-green"></div>
        </div>
      </div>
      <div class="hint-row">
        <div class="hint-line"></div>
        <div class="hint-text">drag to reveal</div>
      </div>
    </div>
  </div>
</div>
