<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Topographic / fluid mask gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>

    <!-- Green gradient for controller body -->
    <radialGradient id="greenGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3d8a4e"/>
      <stop offset="60%" stop-color="#1e5c2e"/>
      <stop offset="100%" stop-color="#0f3318"/>
    </radialGradient>

    <!-- Green gradient secondary controller -->
    <radialGradient id="greenGrad2" cx="60%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3d8a4e"/>
      <stop offset="60%" stop-color="#1e5c2e"/>
      <stop offset="100%" stop-color="#0f3318"/>
    </radialGradient>

    <!-- White highlight for buttons -->
    <radialGradient id="whiteGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d4c8"/>
    </radialGradient>

    <!-- Fluid topo lines clipping -->
    <clipPath id="roundedSquare">
      <rect width="680" height="680" rx="120"/>
    </clipPath>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="680" rx="120" fill="#f0ede6"/>

  <!-- Topographic contour lines (wheat/gray palette matching the app background) -->
  <g clip-path="url(#roundedSquare)" opacity="0.18">
    <!-- Topo wave lines across the whole bg -->
    <path d="M -60,80 C 60,60 120,100 200,85 C 280,70 340,110 420,90 C 500,70 580,105 680,88" fill="none" stroke="#8a8070" stroke-width="1.2"/>
    <path d="M -60,110 C 80,88 160,128 250,108 C 340,88 400,132 490,112 C 580,92 640,128 780,108" fill="none" stroke="#8a8070" stroke-width="1"/>
    <path d="M -60,140 C 40,118 140,162 220,138 C 300,114 380,158 470,136 C 560,114 620,150 780,132" fill="none" stroke="#8a8070" stroke-width="0.8"/>
    <path d="M -60,510 C 60,488 150,530 240,508 C 330,486 410,530 500,510 C 590,490 640,528 780,508" fill="none" stroke="#8a8070" stroke-width="1.2"/>
    <path d="M -60,540 C 80,516 160,558 260,536 C 360,514 440,558 530,538 C 620,518 660,554 780,536" fill="none" stroke="#8a8070" stroke-width="1"/>
    <path d="M -60,570 C 40,546 160,590 250,566 C 340,542 420,586 510,564 C 600,542 650,580 780,562" fill="none" stroke="#8a8070" stroke-width="0.8"/>

    <!-- Left side waves -->
    <path d="M 30,-30 C 10,80 50,160 25,260 C 0,360 40,430 15,540 C -5,630 30,680 30,730" fill="none" stroke="#8a8070" stroke-width="1"/>
    <path d="M 60,-30 C 38,80 75,160 52,270 C 29,380 68,440 45,550 C 22,640 58,680 58,730" fill="none" stroke="#8a8070" stroke-width="0.7"/>

    <!-- Right side waves -->
    <path d="M 650,-30 C 628,80 665,160 640,260 C 615,360 655,440 630,540 C 605,640 648,680 648,730" fill="none" stroke="#8a8070" stroke-width="1"/>
    <path d="M 620,-30 C 600,80 638,160 614,270 C 590,380 628,440 605,550 C 582,640 618,690 618,730" fill="none" stroke="#8a8070" stroke-width="0.7"/>

    <!-- Center area waves -->
    <path d="M 150,300 C 180,270 240,260 300,275 C 360,290 420,270 480,285 C 520,295 540,310 530,330" fill="none" stroke="#8a8070" stroke-width="0.8"/>
    <path d="M 130,330 C 165,298 230,285 295,302 C 360,319 425,298 490,312 C 535,322 558,340 548,362" fill="none" stroke="#8a8070" stroke-width="0.6"/>
  </g>

  <!-- ============ LEFT PS5 CONTROLLER (slightly behind/tilted) ============ -->
  <g transform="translate(155, 310) rotate(-18) scale(0.72)" opacity="0.85" filter="url(#softShadow)">
    <!-- Controller main body -->
    <path d="
      M 0,-140
      C 50,-145 110,-120 140,-70
      C 165,-25 160,30 145,70
      C 120,130 70,170 20,185
      C -5,192 -5,192 -30,185
      C -80,170 -130,130 -155,70
      C -170,30 -165,-25 -140,-70
      C -110,-120 -50,-145 0,-140 Z
    " fill="url(#greenGrad)"/>
    <!-- Controller grips -->
    <path d="
      M -90,160 C -110,190 -120,230 -115,270 C -110,295 -90,310 -70,305
      C -50,300 -35,275 -38,248 C -42,215 -55,185 -70,168 Z
    " fill="url(#greenGrad)"/>
    <path d="
      M 90,160 C 110,190 120,230 115,270 C 110,295 90,310 70,305
      C 50,300 35,275 38,248 C 42,215 55,185 70,168 Z
    " fill="url(#greenGrad)"/>

    <!-- Touchpad area (lighter) -->
    <rect x="-50" y="-30" width="100" height="65" rx="10" fill="#1a5228" opacity="0.9"/>

    <!-- D-pad (left) -->
    <rect x="-135" y="-25" width="14" height="40" rx="4" fill="#0d2e15"/>
    <rect x="-150" y="-10" width="40" height="14" rx="4" fill="#0d2e15"/>

    <!-- Buttons (right) - △ □ ○ ✕ -->
    <circle cx="110" cy="-30" r="9" fill="#0d2e15"/>
    <circle cx="128" cy="-14" r="9" fill="#0d2e15"/>
    <circle cx="92" cy="-14" r="9" fill="#0d2e15"/>
    <circle cx="110" cy="2" r="9" fill="#0d2e15"/>

    <!-- Analog sticks -->
    <circle cx="-70" cy="60" r="22" fill="#0d2e15"/>
    <circle cx="-70" cy="60" r="14" fill="#e8e0d0"/>

    <circle cx="70" cy="60" r="22" fill="#0d2e15"/>
    <circle cx="70" cy="60" r="14" fill="#e8e0d0"/>

    <!-- PS button -->
    <circle cx="0" cy="70" r="12" fill="#0d2e15"/>

    <!-- Stars decoration -->
    <text x="-105" y="130" font-size="18" fill="white" opacity="0.7" text-anchor="middle">★</text>
    <text x="105" y="130" font-size="18" fill="white" opacity="0.7" text-anchor="middle">★</text>
    <text x="0" y="-85" font-size="14" fill="white" opacity="0.5" text-anchor="middle">★</text>
  </g>

  <!-- ============ RIGHT PS5 CONTROLLER (front/main) ============ -->
  <g transform="translate(490, 310) rotate(18) scale(0.72)" opacity="0.85" filter="url(#softShadow)">
    <!-- Controller main body -->
    <path d="
      M 0,-140
      C 50,-145 110,-120 140,-70
      C 165,-25 160,30 145,70
      C 120,130 70,170 20,185
      C -5,192 -5,192 -30,185
      C -80,170 -130,130 -155,70
      C -170,30 -165,-25 -140,-70
      C -110,-120 -50,-145 0,-140 Z
    " fill="url(#greenGrad2)"/>
    <!-- Grips -->
    <path d="
      M -90,160 C -110,190 -120,230 -115,270 C -110,295 -90,310 -70,305
      C -50,300 -35,275 -38,248 C -42,215 -55,185 -70,168 Z
    " fill="url(#greenGrad2)"/>
    <path d="
      M 90,160 C 110,190 120,230 115,270 C 110,295 90,310 70,305
      C 50,300 35,275 38,248 C 42,215 55,185 70,168 Z
    " fill="url(#greenGrad2)"/>

    <!-- Touchpad -->
    <rect x="-50" y="-30" width="100" height="65" rx="10" fill="#1a5228" opacity="0.9"/>

    <!-- D-pad -->
    <rect x="-135" y="-25" width="14" height="40" rx="4" fill="#0d2e15"/>
    <rect x="-150" y="-10" width="40" height="14" rx="4" fill="#0d2e15"/>

    <!-- Buttons -->
    <circle cx="110" cy="-30" r="9" fill="#0d2e15"/>
    <circle cx="128" cy="-14" r="9" fill="#0d2e15"/>
    <circle cx="92" cy="-14" r="9" fill="#0d2e15"/>
    <circle cx="110" cy="2" r="9" fill="#0d2e15"/>

    <!-- Analog sticks -->
    <circle cx="-70" cy="60" r="22" fill="#0d2e15"/>
    <circle cx="-70" cy="60" r="14" fill="#e8e0d0"/>
    <circle cx="70" cy="60" r="22" fill="#0d2e15"/>
    <circle cx="70" cy="60" r="14" fill="#e8e0d0"/>

    <!-- PS button -->
    <circle cx="0" cy="70" r="12" fill="#0d2e15"/>

    <!-- Stars -->
    <text x="-105" y="130" font-size="18" fill="white" opacity="0.7" text-anchor="middle">★</text>
    <text x="105" y="130" font-size="18" fill="white" opacity="0.7" text-anchor="middle">★</text>
    <text x="0" y="-85" font-size="14" fill="white" opacity="0.5" text-anchor="middle">★</text>
  </g>

  <!-- ============ MAIN CENTER CONTROLLER (largest, centered) ============ -->
  <g transform="translate(340, 330)" filter="url(#softShadow)">
    <!-- Main body shape -->
    <path d="
      M 0,-175
      C 65,-180 140,-148 175,-88
      C 205,-32 200,38 180,88
      C 150,163 88,213 25,232
      C 6,240 -6,240 -25,232
      C -88,213 -150,163 -180,88
      C -200,38 -205,-32 -175,-88
      C -140,-148 -65,-180 0,-175 Z
    " fill="url(#greenGrad)"/>

    <!-- Left grip -->
    <path d="
      M -112,200 C -136,238 -150,288 -144,338 C -138,368 -112,388 -88,382
      C -64,376 -44,345 -48,310 C -53,268 -70,232 -88,210 Z
    " fill="url(#greenGrad)"/>
    <!-- Right grip -->
    <path d="
      M 112,200 C 136,238 150,288 144,338 C 138,368 112,388 88,382
      C 64,376 44,345 48,310 C 53,268 70,232 88,210 Z
    " fill="url(#greenGrad)"/>

    <!-- Center light bar / seam -->
    <rect x="-12" y="165" width="24" height="6" rx="3" fill="#e8e0d0" opacity="0.5"/>

    <!-- Touchpad (main focal area with brand) -->
    <rect x="-62" y="-38" width="124" height="80" rx="14" fill="#174d22" opacity="0.95"/>
    <!-- Subtle shine on touchpad -->
    <rect x="-58" y="-35" width="116" height="30" rx="10" fill="white" opacity="0.04"/>

    <!-- Create a fluid mask split down the middle of the touchpad — the key shader effect reference -->
    <path d="M 0,-38 C 15,-20 10,5 0,42 C -10,5 -15,-20 0,-38 Z" fill="#2a8040" opacity="0.5"/>

    <!-- D-pad (left side) -->
    <g>
      <rect x="-165" y="-32" width="16" height="50" rx="5" fill="#0d2e15"/>
      <rect x="-184" y="-13" width="50" height="16" rx="5" fill="#0d2e15"/>
      <!-- Triangle markers on d-pad -->
      <polygon points="-157,-26 -153,-18 -161,-18" fill="#1e5c2e"/>
      <polygon points="-157,38 -153,30 -161,30" fill="#1e5c2e"/>
    </g>

    <!-- Face buttons (right side) △ □ ○ ✕ -->
    <g>
      <!-- △ top -->
      <circle cx="138" cy="-38" r="13" fill="#0d2e15"/>
      <polygon points="138,-48 143,-30 133,-30" fill="#e8e0d0" opacity="0.8"/>
      <!-- □ left -->
      <circle cx="118" cy="-18" r="13" fill="#0d2e15"/>
      <rect x="111" y="-25" width="14" height="14" rx="2" fill="#e8e0d0" opacity="0.8"/>
      <!-- ○ right -->
      <circle cx="158" cy="-18" r="13" fill="#0d2e15"/>
      <circle cx="158" cy="-18" r="6" fill="none" stroke="#e8e0d0" stroke-width="2" opacity="0.8"/>
      <!-- ✕ bottom -->
      <circle cx="138" cy="2" r="13" fill="#0d2e15"/>
      <line x1="133" y1="-3" x2="143" y2="7" stroke="#e8e0d0" stroke-width="2.2" opacity="0.8"/>
      <line x1="143" y1="-3" x2="133" y2="7" stroke="#e8e0d0" stroke-width="2.2" opacity="0.8"/>
    </g>

    <!-- Left analog stick -->
    <circle cx="-88" cy="75" r="28" fill="#0d2e15"/>
    <circle cx="-88" cy="75" r="18" fill="#e8e0d0"/>
    <circle cx="-88" cy="75" r="8" fill="#c8c0b0" opacity="0.6"/>

    <!-- Right analog stick -->
    <circle cx="88" cy="75" r="28" fill="#0d2e15"/>
    <circle cx="88" cy="75" r="18" fill="#e8e0d0"/>
    <circle cx="88" cy="75" r="8" fill="#c8c0b0" opacity="0.6"/>

    <!-- PS logo button (center bottom) -->
    <circle cx="0" cy="88" r="16" fill="#0d2e15"/>
    <!-- Simplified PS mark -->
    <text x="0" y="93" text-anchor="middle" font-size="14" fill="#2a8040" font-weight="bold" font-family="Georgia, serif">PS</text>

    <!-- Create/Options small buttons -->
    <rect x="-42" y="50" width="22" height="10" rx="5" fill="#0d2e15" opacity="0.9"/>
    <rect x="20" y="50" width="22" height="10" rx="5" fill="#0d2e15" opacity="0.9"/>

    <!-- Mic dot array (center) -->
    <circle cx="-8" cy="66" r="2" fill="#0d2e15" opacity="0.7"/>
    <circle cx="0" cy="66" r="2" fill="#0d2e15" opacity="0.7"/>
    <circle cx="8" cy="66" r="2" fill="#0d2e15" opacity="0.7"/>

    <!-- Stars on controller body -->
    <text x="-148" y="140" font-size="22" fill="white" opacity="0.75" text-anchor="middle">★</text>
    <text x="148" y="140" font-size="22" fill="white" opacity="0.75" text-anchor="middle">★</text>
    <text x="-60" y="-120" font-size="16" fill="white" opacity="0.5" text-anchor="middle">★</text>
    <text x="60" y="-120" font-size="16" fill="white" opacity="0.5" text-anchor="middle">★</text>

    <!-- Fluid topographic ripple lines on controller — referencing the shader/mask effect -->
    <ellipse rx="60" ry="45" fill="none" stroke="white" stroke-width="0.8" opacity="0.12" transform="translate(0, -5) rotate(-8)"/>
    <ellipse rx="90" ry="68" fill="none" stroke="white" stroke-width="0.6" opacity="0.08" transform="translate(0, -5) rotate(-8)"/>
    <ellipse rx="120" ry="90" fill="none" stroke="white" stroke-width="0.5" opacity="0.06" transform="translate(0, -5) rotate(-8)"/>
  </g>

  <!-- ============ FS LETTERFORMS (center, overlaid) ============ -->
  <!-- Subtle FS in green on wheat background strip at bottom -->
  <rect x="0" y="588" width="680" height="92" rx="0" fill="#e8e4db" opacity="0.92" clip-path="url(#roundedSquare)"/>
  <rect x="0" y="585" width="680" height="3" fill="#2a6b38" opacity="0.35"/>

  <!-- F -->
  <line x1="278" y1="614" x2="278" y2="660" stroke="#1a5228" stroke-width="7" stroke-linecap="round"/>
  <line x1="278" y1="614" x2="316" y2="614" stroke="#1a5228" stroke-width="7" stroke-linecap="round"/>
  <line x1="278" y1="637" x2="308" y2="637" stroke="#1a5228" stroke-width="7" stroke-linecap="round"/>

  <!-- S -->
  <path d="M 352,618 C 328,608 312,618 318,632 C 324,644 354,643 358,658 C 362,672 344,680 320,670" fill="none" stroke="#1a5228" stroke-width="7" stroke-linecap="round"/>

  <!-- Separator dot -->
  <circle cx="340" cy="648" r="3" fill="#4aae5e" opacity="0.6"/>

  <!-- FLUIDSENSE label -->
  <text x="340" y="678" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="600" letter-spacing="8" fill="#1a5228" opacity="0.75">FLUIDSENSE</text>

  <!-- Corner reticle marks (wheat/green) -->
  <g stroke="#2a6b38" stroke-width="1.8" opacity="0.5">
    <!-- TL -->
    <line x1="36" y1="36" x2="60" y2="36"/>
    <line x1="36" y1="36" x2="36" y2="60"/>
    <!-- TR -->
    <line x1="644" y1="36" x2="620" y2="36"/>
    <line x1="644" y1="36" x2="644" y2="60"/>
    <!-- BL -->
    <line x1="36" y1="580" x2="60" y2="580"/>
    <line x1="36" y1="580" x2="36" y2="556"/>
    <!-- BR -->
    <line x1="644" y1="580" x2="620" y2="580"/>
    <line x1="644" y1="580" x2="644" y2="556"/>
  </g>

  <!-- Outer subtle ring -->
  <rect width="680" height="680" rx="120" fill="none" stroke="#2a6b38" stroke-width="1.5" opacity="0.2"/>
</svg>